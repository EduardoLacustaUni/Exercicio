name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/local-notifications
          npx cap init "Kegel Meditacao" "com.kegel.app" --web-dir=dist

      - name: Build Web Application
        run: npm run build

      - name: Remove existing android directory if it exists
        run: rm -rf android

      - name: Add Android Platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Fix Duplicate Kotlin Configurations
        run: |
          cd android
          # Força as configurações de exclusão de duplicados no build.gradle do app
          echo "android { configurations.all { resolutionStrategy { exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8' }; resolutionStrategy { exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7' } } }" >> app/build.gradle
      
      - name: Add WorkManager dependency to build.gradle
        run: |
          cd android/app
          if ! grep -q "androidx.work:work-runtime" build.gradle; then
            sed -i "/dependencies {/a\    implementation 'androidx.work:work-runtime-ktx:2.8.1'" build.gradle
          fi
          
      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
